apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: attendance-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/chimdi247/attendance-app-flask-postgres.git
    targetRevision: HEAD
    path: attendance-app-chart
    helm:
      releaseName: attendance-app
  destination:
    server: https://kubernetes.default.svc
    namespace: attendance-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
